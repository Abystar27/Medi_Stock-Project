<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediStock</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/328bbfc4a9.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="headNav">
      <a class="home" href="dashboard.html">
        <div class="logo">
          <img src="/Images/medi1.png" id="logo" />
          <h1>MediStock</h1>
        </div>
      </a>
      <ul class="navLinks">
        <li><a href="inventory.html">Inventory </a></li>
        <li>Order</li>
        <li>Report</li>
        <li>Alert</li>
      </ul>
      <div class="rightNav">
        <div class="searchbar">
          <input type="text" id="search" placeholder="Search by name..." />
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
        <div class="userProfile">
          <i class="fa-solid fa-user"></i>
          <p>Profile</p>
        </div>
      </div>
    </div>
    <div>
      <i class="fa-solid fa-caret-left" id="back"></i>
    </div>
    <div class="productDetails">
      <h1>Product Details</h1>
      <h2 id="name"></h2>
      <p>Category: <span id="category"></span></p>
      <p>Quantity: <span id="quantity"></span></p>
      <p>Batch: <span id="batch"></span></p>
      <p>Expiry: <span id="expiry"></span></p>
    </div>
    <script src="supplydetails.js"></script>
  </body>
</html>
